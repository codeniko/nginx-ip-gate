# Host-based deployment: each protected app lives on its own (sub)domain.
# All apps share a single allowlist via the same /verify, /gate, /heartbeat,
# and /deauth paths.
#
# Paste the gate-specific `location` blocks below into each `server {}` block
# you want to gate, alongside the existing `proxy_pass` for the upstream app.
# The upstream URL `http://127.0.0.1:8350` matches the default
# `docker-compose.yaml`, which publishes the gate's port to localhost.
#
# Rate limiting (opt-in)
# ----------------------
# The /gate POST and /heartbeat endpoints each run a bcrypt compare
# (~100ms) and could be DoS'd by a flood of credentialed requests. To
# protect against that, two `limit_req zone=gate_login ...` lines are
# included below but commented out. To enable:
#
#   1) Install the companion http-block snippet (declares the zone):
#        sudo cp nginx-http-ip-gate.conf /etc/nginx/conf.d/
#   2) Uncomment the two `limit_req zone=gate_login ...` lines below.
#   3) sudo nginx -t && sudo systemctl reload nginx
#
# If you uncomment the limit_req lines without installing the snippet,
# `nginx -t` will fail with:
#   "zero size shared memory zone gate_login"

# ---- Reusable snippet (drop into each gated server block) -----------------

# Public: login form + POST handler. Each POST runs a bcrypt compare;
# uncomment limit_req to throttle credentialed brute-force.
location = /gate {
    # limit_req zone=gate_login burst=5 nodelay;
    proxy_pass http://127.0.0.1:8350/gate;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header Host $host;
}

# Public: machine-friendly heartbeat (router DDNS, cron, automations).
# Same bcrypt cost as /gate. A typical router checks in every 5–10 min,
# well below 10r/m, so the limit doesn't get in the way.
location = /heartbeat {
    # limit_req zone=gate_login burst=5 nodelay;
    proxy_pass http://127.0.0.1:8350/heartbeat;
    proxy_set_header X-Forwarded-For $remote_addr;
}

# Public: idempotent "remove my IP from the allowlist". No bcrypt, no
# rate limit needed.
location = /deauth {
    proxy_pass http://127.0.0.1:8350/deauth;
    proxy_set_header X-Forwarded-For $remote_addr;
}

# Internal: subrequest target for auth_request. Hit on every protected
# request — do NOT rate-limit, or you'll break legitimate streaming.
location = /__auth {
    internal;
    proxy_pass http://127.0.0.1:8350/verify;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Forwarded-For $remote_addr;
}

# 401 fallback. Pass the URL the user originally tried to reach so the
# gate can bounce them back after auth. Server-side validation rejects
# unsafe values (open-redirect protection); see the README's Nginx config
# section for the multi-`&` query-string limitation.
location @to_gate {
    return 302 /gate?next=$request_uri;
}

# Gate everything else
location / {
    auth_request /__auth;
    error_page 401 = @to_gate;
    proxy_pass http://upstream-app;
}
