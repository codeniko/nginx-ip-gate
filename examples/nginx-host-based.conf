# Host-based deployment: each protected app lives on its own (sub)domain.
# All apps share a single allowlist via the same /verify, /gate, /heartbeat,
# and /deauth paths.
#
# Paste the gate-specific `location` blocks below into each `server {}` block
# you want to gate, alongside the existing `proxy_pass` for the upstream app.
# The upstream URL `http://127.0.0.1:3000` matches the default
# `docker-compose.yaml`, which publishes the gate's port to localhost.
#
# IMPORTANT — rate limiting
# -------------------------
# The `limit_req zone=gate_login ...` directives below reference a shared
# memory zone that MUST be declared at the http {} level (not inside a
# server block). Add this once to your global Nginx config (e.g.
# /etc/nginx/nginx.conf or a snippet in /etc/nginx/conf.d/):
#
#   limit_req_zone $binary_remote_addr zone=gate_login:10m rate=10r/m;
#
#   # 10m holds ~160k unique IPs. 10r/m is per-IP. Tune burst per location.

# ---- Reusable snippet (drop into each gated server block) -----------------

# Public: login form + POST handler. Rate-limited because each POST runs
# a bcrypt compare (~100ms). Without a limit, async-fired POSTs both
# brute-force credentials AND tie up the gate's event loop.
location = /gate {
    limit_req zone=gate_login burst=5 nodelay;
    proxy_pass http://127.0.0.1:3000/gate;
    proxy_set_header X-Forwarded-For $remote_addr;
    proxy_set_header Host $host;
}

# Public: machine-friendly heartbeat (router DDNS, cron, automations).
# Same bcrypt cost as /gate, so same rate limit applies. A typical router
# checks in every 5–10 min, well below 10r/m.
location = /heartbeat {
    limit_req zone=gate_login burst=5 nodelay;
    proxy_pass http://127.0.0.1:3000/heartbeat;
    proxy_set_header X-Forwarded-For $remote_addr;
}

# Public: idempotent "remove my IP from the allowlist". No bcrypt, no
# rate limit needed.
location = /deauth {
    proxy_pass http://127.0.0.1:3000/deauth;
    proxy_set_header X-Forwarded-For $remote_addr;
}

# Internal: subrequest target for auth_request. Hit on every protected
# request — do NOT rate-limit, or you'll break legitimate streaming.
location = /__auth {
    internal;
    proxy_pass http://127.0.0.1:3000/verify;
    proxy_pass_request_body off;
    proxy_set_header Content-Length "";
    proxy_set_header X-Forwarded-For $remote_addr;
}

# Gate everything else
location / {
    auth_request /__auth;
    error_page 401 = @to_gate;
    proxy_pass http://upstream-app;
}

location @to_gate {
    # Pass the URL the user originally tried to reach so the gate can
    # bounce them back after auth. Server-side validation rejects unsafe
    # values (open-redirect protection); see the README's Nginx config
    # section for the multi-`&` query-string limitation.
    return 302 /gate?next=$request_uri;
}
