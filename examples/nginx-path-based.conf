# Path-based deployment: multiple apps live under one server block on
# different path prefixes (e.g. /jellyfin/, /nextcloud/). All apps share a
# single allowlist; one /gate URL per prefix lets the post-login redirect
# (Location: ./) land the user back on the right app.

# IMPORTANT — declare the rate-limit zone at the http {} level. This block
# cannot live inside `server {}`. Place it in your main nginx.conf or a
# snippet in /etc/nginx/conf.d/:
#
#   limit_req_zone $binary_remote_addr zone=gate_login:10m rate=10r/m;
#
# 10m of shared memory holds ~160k unique IPs. rate=10r/m is per-IP. The
# `burst=5 nodelay` on each protected location lets a small legitimate
# burst through immediately while still capping sustained brute-force.

server {
    listen 443 ssl http2;
    server_name example.com;

    # Subrequest target reused by every gated location below. Hit on every
    # protected request — do NOT rate-limit.
    location = /__auth {
        internal;
        proxy_pass http://127.0.0.1:3000/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # One global heartbeat URL covers every app (single shared allowlist).
    # Rate-limited to throttle credentialed brute-force.
    location = /heartbeat {
        limit_req zone=gate_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000/heartbeat;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # ---- Jellyfin under /jellyfin/ -----------------------------------------
    location = /jellyfin/gate {
        limit_req zone=gate_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000/gate;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }
    location = /jellyfin/deauth {
        proxy_pass http://127.0.0.1:3000/deauth;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
    location /jellyfin/ {
        auth_request /__auth;
        error_page 401 = @to_jellyfin_gate;
        proxy_pass http://jellyfin:8096/;
    }
    location @to_jellyfin_gate { return 302 /jellyfin/gate; }

    # ---- Nextcloud under /nextcloud/ ---------------------------------------
    location = /nextcloud/gate {
        limit_req zone=gate_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000/gate;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }
    location = /nextcloud/deauth {
        proxy_pass http://127.0.0.1:3000/deauth;
        proxy_set_header X-Forwarded-For $remote_addr;
    }
    location /nextcloud/ {
        auth_request /__auth;
        error_page 401 = @to_nextcloud_gate;
        proxy_pass http://nextcloud:8080/;
    }
    location @to_nextcloud_gate { return 302 /nextcloud/gate; }
}
