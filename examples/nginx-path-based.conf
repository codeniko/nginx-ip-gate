# Path-based deployment: multiple apps live under one server block on
# different path prefixes (e.g. /app1/, /app2/). All apps share a single
# allowlist AND a single /gate URL — the gate's `?next=` mechanism handles
# returning the user to the originating app after auth.
#
# IMPORTANT — declare the rate-limit zone at the http {} level. This block
# cannot live inside `server {}`. Place it in your main nginx.conf or a
# snippet in /etc/nginx/conf.d/:
#
#   limit_req_zone $binary_remote_addr zone=gate_login:10m rate=10r/m;
#
# 10m of shared memory holds ~160k unique IPs. rate=10r/m is per-IP. The
# `burst=5 nodelay` on each protected location lets a small legitimate
# burst through immediately while still capping sustained brute-force.

server {
    listen 443 ssl http2;
    server_name example.com;

    # Subrequest target reused by every gated location below. Hit on every
    # protected request — do NOT rate-limit.
    location = /__auth {
        internal;
        proxy_pass http://127.0.0.1:3000/verify;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Single shared /gate (login form + POST handler). Both apps below
    # bounce unauthenticated users here via `error_page 401 = @to_gate`,
    # passing the original URL as ?next=$request_uri so the gate can send
    # them back after auth.
    location = /gate {
        limit_req zone=gate_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000/gate;
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_set_header Host $host;
    }

    # Single shared /heartbeat (router DDNS, cron, automations).
    location = /heartbeat {
        limit_req zone=gate_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:3000/heartbeat;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # Single shared /deauth (no auth, removes the requester's IP).
    location = /deauth {
        proxy_pass http://127.0.0.1:3000/deauth;
        proxy_set_header X-Forwarded-For $remote_addr;
    }

    # ---- App 1 under /app1/ ------------------------------------------------
    location /app1/ {
        auth_request /__auth;
        error_page 401 = @to_gate;
        proxy_pass http://app1-upstream/;
    }

    # ---- App 2 under /app2/ ------------------------------------------------
    location /app2/ {
        auth_request /__auth;
        error_page 401 = @to_gate;
        proxy_pass http://app2-upstream/;
    }

    # Shared 401 fallback for every gated location above. Pass the original
    # URL as `next` so the gate can bounce the user back after auth.
    # Server-side validation rejects unsafe values (open-redirect protection).
    location @to_gate {
        return 302 /gate?next=$request_uri;
    }
}
