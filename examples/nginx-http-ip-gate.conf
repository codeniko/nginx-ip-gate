# OPTIONAL — install only if you want rate-limiting on /gate POST and
# /heartbeat to throttle credentialed brute-force.
#
# Default state: rate-limiting is OFF in the shipped example configs.
# The relevant `limit_req zone=gate_login ...` lines in
# nginx-host-based.conf / nginx-path-based.conf are commented out by
# default — uncomment them only if you've installed this file.
#
# To enable rate-limiting (two steps):
#
#   1) Install this snippet at the http {} level. On a typical Linux
#      Nginx install, the http block already includes
#      /etc/nginx/conf.d/*.conf, so the easiest path is:
#          sudo cp nginx-http-ip-gate.conf /etc/nginx/conf.d/
#   2) Uncomment the `limit_req zone=gate_login ...` lines in your
#      server-block config (two of them: in /gate and /heartbeat).
#   3) sudo nginx -t && sudo systemctl reload nginx
#
# If you uncomment the limit_req lines without installing this snippet,
# `nginx -t` will fail with:  "zero size shared memory zone gate_login"

# Rate-limit credentialed endpoints (/gate POST, /heartbeat) per client IP.
# 10m of shared memory holds ~160k unique IPs. 10r/m is per-IP — well
# below brute-force speeds, well above legitimate use (login, router DDNS
# check-ins). `burst=5 nodelay` on each location lets a small legitimate
# burst through immediately while still capping sustained attack traffic.
limit_req_zone $binary_remote_addr zone=gate_login:10m rate=10r/m;
