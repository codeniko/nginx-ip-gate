<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, sans-serif; max-width: 22rem; margin: 4rem auto; padding: 0 1rem; }
  h1 { font-size: 1.25rem; margin: 0 0 1rem; }
  form { display: grid; gap: 0.75rem; }
  input { font: inherit; padding: 0.6rem 0.75rem; border-radius: 0.4rem; border: 1px solid #888; }
  button { font: inherit; padding: 0.6rem 0.75rem; border-radius: 0.4rem; border: 0; background: #4a7; color: #fff; cursor: pointer; }
  button:hover { background: #3a6; }
  .err { color: #c33; font-size: 0.9rem; min-height: 1.2em; }
</style>
</head>
<body>
<h1>Sign in</h1>
<form method="POST" autocomplete="on">
  <input name="username" placeholder="Username" autocomplete="username" autofocus required>
  <input name="password" type="password" placeholder="Password" autocomplete="current-password" required>
  <div class="err">{{ERROR}}</div>
  <button type="submit">Sign in</button>
</form>
</body>
</html>
